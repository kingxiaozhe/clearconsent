name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test # 单元测试（N4：CI 此前不跑测试）；E2E 需真实浏览器+显示器，作本地门
      - run: npm run build
      - run: npm run zip
      - uses: actions/upload-artifact@v4
        with:
          name: clearconsent-chrome
          path: .output/*.zip
          include-hidden-files: true
          if-no-files-found: error
